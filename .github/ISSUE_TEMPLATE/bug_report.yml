name: Bug report
description: Report broken behavior in unifi-mcp
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include the tool name, its arguments, and the response.
      placeholder: |
        1. Load Network tools
        2. Call tool `list_clients` with ...
        3. Observe error ...
    validations:
      required: true
  - type: dropdown
    id: product
    attributes:
      label: UniFi product affected
      multiple: true
      options:
        - Network
        - Protect
        - Access
        - Cross-product (auth, discovery, loader)
    validations:
      required: true
  - type: input
    id: console
    attributes:
      label: UniFi console model and OS version
      placeholder: "UDM Pro, UniFi OS 5.0.16"
    validations:
      required: true
  - type: input
    id: product-version
    attributes:
      label: Product app version
      placeholder: "Network 10.2.105"
    validations:
      required: true
  - type: input
    id: mcp-version
    attributes:
      label: unifi-mcp version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      render: shell
