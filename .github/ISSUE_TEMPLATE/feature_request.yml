name: Feature request
description: Suggest a new capability or enhancement
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. What are you trying to do with UniFi that unifi-mcp does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the tool or API surface you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This uses a local-console UniFi API (not cloud Site Manager).
        - label: I have checked the README tool inventory for existing coverage.
